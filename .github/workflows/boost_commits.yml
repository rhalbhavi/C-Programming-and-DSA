name: C Header Reformat (Final Graph Boost)

on:
  workflow_dispatch:

jobs:
  commit-spree:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Using your secret token for the checkout as well
          token: ${{ secrets.MY_COMMIT_TOKEN }}

      - name: Config Git
        run: |
          git config --global user.name "rhalbhavi"
          git config --global user.email "halbhaviriya@gmail.com"

      - name: Upgrade Headers to 3-Dashes
        run: |
          # Find all .c files and process them one by one
          find . -type f -name "*.c" -not -path "*/.*" -print0 | while IFS= read -r -d '' file; do
            if [ -f "$file" ]; then
              first_line=$(head -n 1 "$file")
              
              # Only process if it's a double-slash comment
              if [[ "$first_line" == //* ]]; then
                
                # Strip all existing markers and whitespace
                temp=$(echo "$first_line" | sed 's|^//||' | sed 's|^[[:space:]-]*||')
                clean_content=$(echo "$temp" | sed 's|[[:space:]/-]*$||')
                
                if [ -z "$clean_content" ]; then clean_content="Source Code"; fi

                # The New Target: Three dashes
                new_header="// --- $clean_content --- //"
                
                # If the line is already correct, skip to avoid "nothing to commit" errors
                if [ "$first_line" == "$new_header" ]; then
                  continue
                fi

                # Apply change and commit immediately
                sed -i "1s@.*@$new_header@" "$file"
                git add "$file"
                git commit -m "style: upgrade header to 3-dash format in $(basename "$file")"
                echo "✅ Staged & Committed: $file"
              fi
            fi
          done

      - name: Authenticated Push
        env:
          # Pulls the secret you created in Repo Settings
          MY_TOKEN: ${{ secrets.MY_COMMIT_TOKEN }}
        run: |
          # 1. Rebuild the remote URL with the token to bypass 403 Forbidden
          git remote set-url origin https://${MY_TOKEN}@github.com/rhalbhavi/C-Programming-and-Data-Structures.git
          
          # 2. Final sync with the remote main branch
          git pull --rebase origin main
          
          # 3. Push the entire stack of commits to GitHub
          git push origin main
