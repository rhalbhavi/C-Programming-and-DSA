name: C Header Reformat (Format Upgrade)

on:
  workflow_dispatch:

jobs:
  commit-spree:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # We still use the secret here
          token: ${{ secrets.MY_COMMIT_TOKEN }}

      - name: Config Git
        run: |
          git config --global user.name "rhalbhavi"
          git config --global user.email "halbhaviriya@gmail.com"

      - name: Upgrade Headers to 3-Dashes
        run: |
          find . -type f -name "*.c" -not -path "*/.*" -print0 | while IFS= read -r -d '' file; do
            if [ -f "$file" ]; then
              first_line=$(head -n 1 "$file")
              if [[ "$first_line" == //* ]]; then
                # Strip and clean
                temp=$(echo "$first_line" | sed 's|^//||' | sed 's|^[[:space:]-]*||')
                clean_content=$(echo "$temp" | sed 's|[[:space:]/-]*$||')
                if [ -z "$clean_content" ]; then clean_content="Source Code"; fi

                new_header="// --- $clean_content --- //"
                
                if [ "$first_line" == "$new_header" ]; then
                  continue
                fi

                sed -i "1s@.*@$new_header@" "$file"
                git add "$file"
                git commit -m "style: upgrade header to 3-dash format for $(basename "$file")"
              fi
            fi
          done

      - name: Authenticated Push
        env:
          # This pulls your token from the repo secrets
          MY_TOKEN: ${{ secrets.MY_COMMIT_TOKEN }}
        run: |
          # Inject the token into the remote URL to bypass 403
          git remote set-url origin https://rhalbhavi:${MY_TOKEN}@github.com/rhalbhavi/C-Programming-and-Data-Structures.git
          
          # Pull latest and Push
          git pull --rebase origin ${{ github.ref_name }}
          git push origin ${{ github.ref_name }}
