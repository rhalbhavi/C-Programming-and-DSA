name: C Header Reformat (Commit Boost)

on:
  workflow_dispatch:

jobs:
  commit-spree:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Config Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Reformat .c Files
        run: |
          FILES=$(find . -type f -name "*.c" -not -path "*/.*")

          if [ -z "$FILES" ]; then
            echo "No .c files found!"
            exit 0
          fi

          for file in $FILES; do
            first_line=$(head -n 1 "$file")

            # Check if starts with //
            if [[ "$first_line" == //* ]]; then
              if [[ "$first_line" == *"// --"* ]]; then
                continue
              fi

              content=$(echo "$first_line" | sed 's|//||' | sed 's|^[[:space:]]*||' | sed 's|[[:space:]]*$||')
              if [ -z "$content" ]; then content="Source File"; fi

              new_header="// -- $content -- //"
              sed -i "1s@.*@$new_header@" "$file"
              
              git add "$file"
              git commit -m "style: reformat header in $(basename "$file")"
            fi
          done

      - name: Sync and Push
        run: |
          # This handles the 'non-fast-forward' error by rebasing
          git pull --rebase origin ${{ github.ref_name }}
          git push origin ${{ github.ref_name }}
