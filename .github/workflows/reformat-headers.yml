name: C Header Reformat (Commit Boost)

on:
  workflow_dispatch:

jobs:
  commit-spree:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Config Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Reformat .c Files
        run: |
          find . -type f -name "*.c" -not -path "*/.*" -print0 | while IFS= read -r -d '' file; do
            
            if [ -f "$file" ]; then
              first_line=$(head -n 1 "$file")

              # Only process if it starts with //
              if [[ "$first_line" == //* ]]; then
                
                # 1. Strip leading // and any leading spaces/dashes
                temp=$(echo "$first_line" | sed 's|^//||' | sed 's|^[[:space:]-]*||')

                # 2. Strip trailing // and any trailing spaces/dashes
                # This uses a regex that looks for any combination of / or - or space at the end
                clean_content=$(echo "$temp" | sed 's|[[:space:]/-]*$||')

                # 3. Fallback if empty
                if [ -z "$clean_content" ]; then clean_content="Source File"; fi

                # 4. Final target format
                new_header="// -- $clean_content -- //"
                
                # 5. Skip if it's already perfect
                if [ "$first_line" == "$new_header" ]; then
                  continue
                fi

                # 6. Overwrite line 1
                sed -i "1s@.*@$new_header@" "$file"
                
                git add "$file"
                git commit -m "style: final header cleanup in $(basename "$file")"
                echo "✅ Fixed: $file"
              fi
            fi
          done

      - name: Sync and Push
        run: |
          git pull --rebase origin ${{ github.ref_name }}
          git push origin ${{ github.ref_name }}
