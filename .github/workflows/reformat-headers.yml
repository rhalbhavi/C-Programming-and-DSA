name: C Header Reformat (Commit Boost)

on:
  workflow_dispatch:

jobs:
  commit-spree:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Config Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Reformat .c Files
        run: |
          find . -type f -name "*.c" -not -path "*/.*" -print0 | while IFS= read -r -d '' file; do
            
            if [ -f "$file" ]; then
              first_line=$(head -n 1 "$file")

              # 1. Check if it starts with //
              if [[ "$first_line" == //* ]]; then
                
                # 2. SANITIZE: Remove existing //, --, and extra spaces/slashes from BOTH ends
                # This turns "// -- -- Text -- // -- //" into just "Text"
                clean_content=$(echo "$first_line" | sed 's|^//||; s|//[[:space:]]*$||; s|^[[:space:]-]*||; s|[[:space:]-]*$||')

                # 3. Handle empty lines
                if [ -z "$clean_content" ]; then clean_content="Source File"; fi

                # 4. Construct the perfect format
                new_header="// -- $clean_content -- //"
                
                # 5. Skip if the file is already perfect (prevents redundant commits)
                if [[ "$first_line" == "$new_header" ]]; then
                  continue
                fi

                # 6. Apply change and commit
                sed -i "1s@.*@$new_header@" "$file"
                
                git add "$file"
                git commit -m "style: fix header formatting in $(basename "$file")"
                echo "✅ Fixed and Committed: $file"
              fi
            fi
          done

      - name: Sync and Push
        run: |
          git pull --rebase origin ${{ github.ref_name }}
          git push origin ${{ github.ref_name }}
