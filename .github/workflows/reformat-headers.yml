name: C Header Reformat (Commit Boost)

on:
  workflow_dispatch:

jobs:
  commit-spree:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Config Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Reformat .c Files
        run: |
          # Use -print0 to handle all path types safely
          # Exclude hidden directories (like .git) to avoid reading errors
          find . -type f -name "*.c" -not -path "*/.*" -print0 | while IFS= read -r -d '' file; do
            
            # Check if it's a regular file and we have read permission
            if [ -f "$file" ]; then
              
              # Read the first line safely
              first_line=$(head -n 1 "$file")

              # Logic: Starts with // AND doesn't already have the -- format
              if [[ "$first_line" == //* ]] && [[ ! "$first_line" == *"// --"* ]]; then
                
                # Extract text and clean up whitespace
                content=$(echo "$first_line" | sed 's|//||' | sed 's|^[[:space:]]*||' | sed 's|[[:space:]]*$||')
                
                # Placeholder if the line was just //
                if [ -z "$content" ]; then content="Source File"; fi

                new_header="// -- $content -- //"
                
                # Replace line 1 using @ as a safe delimiter
                sed -i "1s@.*@$new_header@" "$file"
                
                # Commit the change
                git add "$file"
                git commit -m "style: reformat header in $(basename "$file")"
                echo "✅ Successfully committed: $file"
              fi
            fi
          done

      - name: Sync and Push
        run: |
          # Pull any remote changes (like the workflow file itself) to avoid push rejection
          git pull --rebase origin ${{ github.ref_name }}
          git push origin ${{ github.ref_name }}
