name: C Header Reformat (Commit Boost)

on:
  workflow_dispatch:

jobs:
  commit-spree:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Config Git
        run: |
          # This is the magic part that fixes your contribution graph
          git config --global user.name "rhalbhavi"
          git config --global user.email "halbhaviriya@gmail.com"

      - name: Reformat .c Files
        run: |
          find . -type f -name "*.c" -not -path "*/.*" -print0 | while IFS= read -r -d '' file; do
            
            if [ -f "$file" ]; then
              first_line=$(head -n 1 "$file")

              if [[ "$first_line" == //* ]]; then
                
                # Cleaning the line
                temp=$(echo "$first_line" | sed 's|^//||' | sed 's|^[[:space:]-]*||')
                clean_content=$(echo "$temp" | sed 's|[[:space:]/-]*$||')

                if [ -z "$clean_content" ]; then clean_content="Source File"; fi

                new_header="// -- $clean_content -- //"
                
                # Skip if no change is needed
                if [ "$first_line" == "$new_header" ]; then
                  continue
                fi

                # Apply and commit individually
                sed -i "1s@.*@$new_header@" "$file"
                git add "$file"
                git commit -m "style: reformat header for $(basename "$file")"
                echo "✅ Committed: $file"
              fi
            fi
          done

      - name: Sync and Push
        run: |
          git pull --rebase origin ${{ github.ref_name }}
          git push origin ${{ github.ref_name }}
